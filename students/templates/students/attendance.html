{% extends 'students/base.html' %}

{% block content %}
<div class="card shadow-sm border-0 p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-calendar-check text-success"></i> Daily Attendance</h2>
        <h5 class="text-muted">Date: {{ today }}</h5>
    </div>

    <form method="POST">
        {% csrf_token %}
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Student Name</th>
                        <th class="text-center">Mark Status</th>
                    </tr>
                </thead>
                <tbody>
                    {% for student in students %}
                    <tr>
                        <td class="fw-bold">{{ student.first_name }} {{ student.last_name }}</td>
                        <td class="text-center">
                            <div class="btn-group" role="group">
                                <input type="radio" class="btn-check" name="status_{{ student.id }}" 
                                       id="p_{{ student.id }}" value="Present" checked>
                                <label class="btn btn-outline-success" for="p_{{ student.id }}">Present</label>

                                <input type="radio" class="btn-check" name="status_{{ student.id }}" 
                                       id="a_{{ student.id }}" value="Absent">
                                <label class="btn btn-outline-danger" for="a_{{ student.id }}">Absent</label>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100 mt-3 shadow">Save Attendance for Today</button>
    </form>
</div>
{% endblock %}
