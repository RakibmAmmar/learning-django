{% extends 'students/base.html' %}

{% block content %}
    <h2 class="mb-4">Registered Students</h2>
    <a href="{% url 'add_student' %}" class="btn btn-primary mb-3">Add New Student</a>
    <form method="GET" class="d-flex mb-4">
        <input class="form-control me-2" type="search" name="search" 
               placeholder="Search by name..." value="{{ request.GET.search }}">
        <button class="btn btn-outline-success" type="submit">Search</button>
        <a href="{% url 'student_list' %}" class="btn btn-outline-secondary ms-2">Reset</a>
    </form>
    <table class="table table-striped table-bordered">
    <thead class="table-dark">
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Actions</th> </tr>
    </thead>
    <tbody>
        {% for student in students %}
        <tr>
            <td>{{ student.first_name }} {{ student.last_name }}</td>
            <td>{{ student.email }}</td>
            <td>
                <a href="{% url 'edit_student' student.pk %}" class="btn btn-sm btn-warning">Edit</a>
                <a href="{% url 'delete_student' student.pk %}" class="btn btn-sm btn-danger">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
